openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: VERSUS TIERS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: players
    description: Player profiles
  - name: gamemodes
    description: Gamemode management
  - name: rankings
    description: Rankings and leaderboard
  - name: badges
    description: Badge management
  - name: search
    description: Search
  - name: settings
    description: Site settings
  - name: announcements
    description: Announcements
  - name: stats
    description: Site statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Users (admin)
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin)
      parameters:
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
        - name: search
          in: query
          schema: { type: string }
        - name: role
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users/{id}/suspend:
    post:
      operationId: suspendUser
      tags: [users]
      summary: Suspend user
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users/{id}/ban:
    post:
      operationId: banUser
      tags: [users]
      summary: Ban user
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Players
  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List all players
      parameters:
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
        - name: search
          in: query
          schema: { type: string }
        - name: country
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Players list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerList"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Create a player (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{id}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get player profile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDetail"
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update player (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete player (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /players/by-username/{username}:
    get:
      operationId: getPlayerByUsername
      tags: [players]
      summary: Get player by Minecraft username
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDetail"

  # Gamemodes
  /gamemodes:
    get:
      operationId: listGamemodes
      tags: [gamemodes]
      summary: List all gamemodes
      parameters:
        - name: includeDisabled
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Gamemodes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Gamemode"
    post:
      operationId: createGamemode
      tags: [gamemodes]
      summary: Create a gamemode (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GamemodeInput"
      responses:
        "201":
          description: Created gamemode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gamemode"

  /gamemodes/{id}:
    get:
      operationId: getGamemode
      tags: [gamemodes]
      summary: Get gamemode by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Gamemode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gamemode"
    patch:
      operationId: updateGamemode
      tags: [gamemodes]
      summary: Update gamemode (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GamemodeUpdate"
      responses:
        "200":
          description: Updated gamemode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gamemode"
    delete:
      operationId: deleteGamemode
      tags: [gamemodes]
      summary: Delete gamemode (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Rankings
  /rankings:
    get:
      operationId: listRankings
      tags: [rankings]
      summary: List rankings for a gamemode
      parameters:
        - name: gamemodeId
          in: query
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
        - name: tier
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema: { type: string, enum: [points, winRate, matches, kills, tier, recent] }
      responses:
        "200":
          description: Rankings list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RankingList"
    post:
      operationId: createRanking
      tags: [rankings]
      summary: Add player to ranking (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RankingInput"
      responses:
        "201":
          description: Created ranking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ranking"

  /rankings/{id}:
    patch:
      operationId: updateRanking
      tags: [rankings]
      summary: Update ranking (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RankingUpdate"
      responses:
        "200":
          description: Updated ranking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ranking"
    delete:
      operationId: deleteRanking
      tags: [rankings]
      summary: Remove player from ranking (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /rankings/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [rankings]
      summary: Get overall leaderboard
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /rankings/player/{playerId}:
    get:
      operationId: getPlayerRankings
      tags: [rankings]
      summary: Get all rankings for a player
      parameters:
        - name: playerId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Player rankings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ranking"

  # Badges
  /badges:
    get:
      operationId: listBadges
      tags: [badges]
      summary: List all badges
      responses:
        "200":
          description: Badges list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Badge"
    post:
      operationId: createBadge
      tags: [badges]
      summary: Create badge (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BadgeInput"
      responses:
        "201":
          description: Created badge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Badge"

  /badges/{id}:
    delete:
      operationId: deleteBadge
      tags: [badges]
      summary: Delete badge (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /players/{playerId}/badges:
    post:
      operationId: assignBadge
      tags: [badges]
      summary: Assign badge to player (admin)
      parameters:
        - name: playerId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignBadgeInput"
      responses:
        "200":
          description: Badge assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /players/{playerId}/badges/{badgeId}:
    delete:
      operationId: removeBadge
      tags: [badges]
      summary: Remove badge from player (admin)
      parameters:
        - name: playerId
          in: path
          required: true
          schema: { type: integer }
        - name: badgeId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Badge removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Search
  /search:
    get:
      operationId: search
      tags: [search]
      summary: Search players
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: country
          in: query
          schema: { type: string }
        - name: tier
          in: query
          schema: { type: string }
        - name: gamemode
          in: query
          schema: { type: string }
        - name: discord
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  # Settings
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get site settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update site settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  # Announcements
  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create announcement (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    patch:
      operationId: updateAnnouncement
      tags: [announcements]
      summary: Update announcement (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementUpdate"
      responses:
        "200":
          description: Updated announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete announcement (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Site stats
  /stats:
    get:
      operationId: getSiteStats
      tags: [stats]
      summary: Get site-wide statistics
      responses:
        "200":
          description: Site stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteStats"

  /stats/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /stats/tier-distribution:
    get:
      operationId: getTierDistribution
      tags: [stats]
      summary: Get tier distribution across gamemodes
      parameters:
        - name: gamemodeId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Tier distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TierCount"

  /stats/top-players:
    get:
      operationId: getTopPlayers
      tags: [stats]
      summary: Get top players by overall points
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Top players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # Auth schemas
    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username: { type: string, minLength: 3 }
        email: { type: string }
        password: { type: string, minLength: 6 }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }
        rememberMe: { type: boolean }

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email: { type: string }

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token: { type: string }

    # User schemas
    User:
      type: object
      required: [id, username, email, role, createdAt]
      properties:
        id: { type: integer }
        username: { type: string }
        email: { type: string }
        role: { type: string, enum: [guest, member, moderator, admin, owner] }
        status: { type: string, enum: [active, suspended, banned] }
        createdAt: { type: string }
        lastLogin: { type: ["string", "null"] }

    UserUpdate:
      type: object
      properties:
        username: { type: string }
        email: { type: string }
        role: { type: string, enum: [guest, member, moderator, admin, owner] }
        status: { type: string, enum: [active, suspended, banned] }

    UserList:
      type: object
      required: [users, total, page, limit]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # Player schemas
    Player:
      type: object
      required: [id, minecraftUsername, createdAt]
      properties:
        id: { type: integer }
        minecraftUsername: { type: string }
        uuid: { type: ["string", "null"] }
        discord: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        countryCode: { type: ["string", "null"] }
        skinUrl: { type: ["string", "null"] }
        points: { type: integer }
        overallTier: { type: ["string", "null"] }
        badges:
          type: array
          items:
            $ref: "#/components/schemas/Badge"
        createdAt: { type: string }
        updatedAt: { type: string }

    PlayerDetail:
      type: object
      required: [id, minecraftUsername, createdAt]
      properties:
        id: { type: integer }
        minecraftUsername: { type: string }
        uuid: { type: ["string", "null"] }
        discord: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        countryCode: { type: ["string", "null"] }
        skinUrl: { type: ["string", "null"] }
        points: { type: integer }
        overallTier: { type: ["string", "null"] }
        socialLinks: { type: ["string", "null"] }
        badges:
          type: array
          items:
            $ref: "#/components/schemas/Badge"
        rankings:
          type: array
          items:
            $ref: "#/components/schemas/Ranking"
        createdAt: { type: string }
        updatedAt: { type: string }

    PlayerInput:
      type: object
      required: [minecraftUsername]
      properties:
        minecraftUsername: { type: string }
        uuid: { type: string }
        discord: { type: string }
        country: { type: string }
        countryCode: { type: string }
        skinUrl: { type: string }
        socialLinks: { type: string }

    PlayerUpdate:
      type: object
      properties:
        minecraftUsername: { type: string }
        uuid: { type: string }
        discord: { type: string }
        country: { type: string }
        countryCode: { type: string }
        skinUrl: { type: string }
        points: { type: integer }
        overallTier: { type: string }
        socialLinks: { type: string }

    PlayerList:
      type: object
      required: [players, total, page, limit]
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    # Gamemode schemas
    Gamemode:
      type: object
      required: [id, name, enabled, sortOrder, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        icon: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        enabled: { type: boolean }
        sortOrder: { type: integer }
        color: { type: ["string", "null"] }
        playerCount: { type: integer }
        createdAt: { type: string }

    GamemodeInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        icon: { type: string }
        description: { type: string }
        enabled: { type: boolean }
        sortOrder: { type: integer }
        color: { type: string }

    GamemodeUpdate:
      type: object
      properties:
        name: { type: string }
        icon: { type: string }
